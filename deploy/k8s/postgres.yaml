apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: formumind
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: formumind-config
                  key: FORMUMIND_PG_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: formumind-config
                  key: FORMUMIND_PG_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: formumind-secrets
                  key: FORMUMIND_PG_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "formumind", "-d", "formumind"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "formumind", "-d", "formumind"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: formumind
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
