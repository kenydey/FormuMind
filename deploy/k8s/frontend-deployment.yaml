apiVersion: apps/v1
kind: Deployment
metadata:
  name: formumind-frontend
  namespace: formumind
  labels:
    app.kubernetes.io/name: formumind-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: formumind-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formumind-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: formumind-frontend:prod
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: formumind-frontend
  namespace: formumind
spec:
  selector:
    app.kubernetes.io/name: formumind-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
