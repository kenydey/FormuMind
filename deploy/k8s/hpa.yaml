# HorizontalPodAutoscaler — scale API and workers independently.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: formumind-backend
  namespace: formumind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: formumind-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: formumind-worker
  namespace: formumind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: formumind-worker
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
