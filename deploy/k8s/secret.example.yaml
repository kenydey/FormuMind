# Copy to secret.yaml, fill values, apply with: kubectl apply -f secret.yaml
# Do NOT commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: formumind-secrets
  namespace: formumind
type: Opaque
stringData:
  FORMUMIND_PG_PASSWORD: "change-me"
  FORMUMIND_API_TOKEN: "change-me-bearer"
  FORMUMIND_ANTHROPIC_API_KEY: ""
  FORMUMIND_DB_URL: "postgresql+psycopg2://formumind:change-me@postgres.formumind.svc.cluster.local:5432/formumind"
  FORMUMIND_REDIS_URL: "redis://redis.formumind.svc.cluster.local:6379/0"
