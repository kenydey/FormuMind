apiVersion: apps/v1
kind: Deployment
metadata:
  name: formumind-backend
  namespace: formumind
  labels:
    app.kubernetes.io/name: formumind-backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: formumind-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formumind-backend
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: backend
          image: formumind-backend:prod
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: formumind-config
            - secretRef:
                name: formumind-secrets
          volumeMounts:
            - name: shared-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import json, sys, urllib.request
                  r = json.load(urllib.request.urlopen("http://127.0.0.1:8000/health"))
                  db_ok = r.get("database", {}).get("ok")
                  dl = r.get("datalab", {})
                  dl_ok = not dl.get("required") or dl.get("reachable")
                  sys.exit(0 if db_ok and dl_ok else 1)
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 8
            failureThreshold: 3
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: formumind-shared-data
---
apiVersion: v1
kind: Service
metadata:
  name: formumind-backend
  namespace: formumind
spec:
  selector:
    app.kubernetes.io/name: formumind-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
