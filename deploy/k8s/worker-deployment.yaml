apiVersion: apps/v1
kind: Deployment
metadata:
  name: formumind-worker
  namespace: formumind
  labels:
    app.kubernetes.io/name: formumind-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: formumind-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formumind-worker
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: formumind-backend:prod
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.worker.celery_app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=2
          envFrom:
            - configMapRef:
                name: formumind-config
            - secretRef:
                name: formumind-secrets
          volumeMounts:
            - name: shared-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              memory: 8Gi
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os,redis; redis.Redis.from_url(os.environ['FORMUMIND_REDIS_URL']).ping()"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import os,redis; redis.Redis.from_url(os.environ['FORMUMIND_REDIS_URL']).ping()"
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: formumind-shared-data
