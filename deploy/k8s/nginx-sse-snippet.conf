# Standalone nginx reference — SSE task stream (copy into server {} block)
#
# Upstream must load-balance across all backend replicas (k8s Service or compose DNS).

upstream formumind_api {
    server formumind-backend:8000;   # k8s Service name or compose service
    keepalive 32;
}

location /api/tasks/ {
    proxy_pass http://formumind_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    add_header X-Accel-Buffering no;
}

# ingress-nginx equivalent annotations:
#   nginx.ingress.kubernetes.io/proxy-buffering: "off"
#   nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
#   nginx.ingress.kubernetes.io/configuration-snippet: |
#     add_header X-Accel-Buffering "no";
