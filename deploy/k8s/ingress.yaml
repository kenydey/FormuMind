# Requires ingress-nginx controller.
# SSE annotations disable proxy buffering for /api/tasks/* streams.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: formumind
  namespace: formumind
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    # Global timeouts for long sync API calls
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  rules:
    - host: formumind.example.com
      http:
        paths:
          - path: /api/tasks/
            pathType: Prefix
            backend:
              service:
                name: formumind-backend
                port:
                  number: 8000
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: formumind-backend
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: formumind-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: formumind-frontend
                port:
                  number: 80
---
# SSE-specific Ingress (higher priority path + no buffering)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: formumind-sse
  namespace: formumind
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Accel-Buffering "no";
      proxy_http_version 1.1;
      proxy_set_header Connection "";
spec:
  rules:
    - host: formumind.example.com
      http:
        paths:
          - path: /api/tasks/.+/stream
            pathType: ImplementationSpecific
            backend:
              service:
                name: formumind-backend
                port:
                  number: 8000
