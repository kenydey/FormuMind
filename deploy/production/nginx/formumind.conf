# FormuMind edge nginx — SPA + API reverse proxy with SSE-safe task streams.
# Upstreams use Docker Compose service DNS (round-robin across scaled backend replicas).

upstream formumind_backend {
    # Docker Compose publishes multiple backend containers under the same service name.
    server backend:8000;
    keepalive 32;
}

upstream formumind_frontend {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 32m;

    # ── Health (for nginx container healthcheck + external LB) ───────────────
    location = /health {
        proxy_pass http://formumind_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── SSE: async task progress (MUST disable buffering) ──────────────────────
    location /api/tasks/ {
        proxy_pass http://formumind_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        add_header X-Accel-Buffering no;
    }

    # ── REST API (long-running sync endpoints) ───────────────────────────────
    location /api/ {
        proxy_pass http://formumind_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
    }

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://formumind_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
